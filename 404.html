<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - Strona nie znaleziona</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: #fff;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 500px; }
        h1 {
            font-size: 6rem;
            font-weight: 800;
            color: #FF7900;
            line-height: 1;
            margin-bottom: 1rem;
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }
        p {
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        a {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #FF7900;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s;
        }
        a:hover { background: #E66A00; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Strona nie znaleziona</h2>
        <p>Strona, której szukasz, nie istnieje lub została przeniesiona.</p>
        <a href="index.html">Wróć na stronę główną</a>
    </div>
</body>
</html>
